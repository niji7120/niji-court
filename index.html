<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIJI COURT</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;max-width:480px;margin:auto;padding:10px}
.card{border:1px solid #ddd;border-radius:10px;padding:10px;margin-bottom:8px}
button{padding:6px 10px;margin-top:5px}
.chat{height:200px;overflow:auto;border:1px solid #ccc;padding:5px;margin-bottom:5px}
</style>
</head>
<body>

<h2>⚡ 번개 모임</h2>
<input id="mt" placeholder="제목">
<input id="mp" placeholder="장소">
<input id="mtime" placeholder="시간">
<button onclick="addMeet()">등록</button>
<div id="meetList"></div>

<hr>
<h2>💬 채팅</h2>
<div id="chat" class="chat"></div>
<input id="msg"><button onclick="sendMsg()">전송</button>

<hr>
<h2>🛍️ 상품</h2>
<input id="pn" placeholder="상품명">
<input id="pp" placeholder="가격">
<button onclick="addProduct()">등록</button>
<div id="products"></div>

<hr>
<h2>🎒 내 가방</h2>
<div id="bag"></div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let nick = localStorage.getItem('nick') || prompt('닉네임');
localStorage.setItem('nick', nick);

let currentRoom = 'global';
let chatRef = db.ref('chat/global');

function getChatRef(roomId){
  return db.ref('chat/' + roomId);
}

// 모임
function addMeet(){
  const title = mt.value;
  const place = mp.value;
  const time = mtime.value;

  const roomId = Date.now();

  db.ref('meets').push({title, place, time, roomId});
}

function loadMeets(){
  db.ref('meets').on('value', snap=>{
    const data = snap.val();
    meetList.innerHTML='';

    for(let k in data){
      const m = data[k];
      meetList.innerHTML += `
      <div class='card'>
        ${m.title}<br>
        ${m.place} / ${m.time}
        <button onclick="enterRoom('${m.roomId}')">참여</button>
      </div>`;
    }
  });
}

// 채팅
function enterRoom(roomId){
  currentRoom = roomId;

  chatRef.off();
  chatRef = getChatRef(roomId);

  chat.innerHTML='';

  chatRef.limitToLast(50).on('child_added', snap=>{
    const m = snap.val();
    chat.innerHTML += `<div>${m.nick}: ${m.text}</div>`;
  });
}

function sendMsg(){
  const text = msg.value;

  getChatRef(currentRoom).push({nick, text});

  msg.value='';
}

// 상품
function addProduct(){
  const name = pn.value;
  const price = pp.value;

  db.ref('products').push({name, price});
}

function loadProducts(){
  db.ref('products').on('value', snap=>{
    const data = snap.val();
    products.innerHTML='';

    for(let k in data){
      const p = data[k];
      products.innerHTML += `
      <div class='card'>
        ${p.name} (${p.price})
        <button onclick="sendGift('${p.name}','${p.price}')">선물</button>
      </div>`;
    }
  });
}

// 선물
function sendGift(name, price){
  const to = prompt('닉네임');

  db.ref('bags/' + to).push({name, price});
  alert('선물 완료');
}

// 가방
function loadBag(){
  db.ref('bags/' + nick).on('value', snap=>{
    const data = snap.val();
    bag.innerHTML='';

    for(let k in data){
      const i = data[k];
      bag.innerHTML += `<div>${i.name} (${i.price})</div>`;
    }
  });
}

loadMeets();
loadProducts();
loadBag();
</script>

</body>
</html>
