<!-- 🔥 NIJI COURT 업그레이드 버전 (채팅방 + 선물하기 포함) -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIJI COURT UPGRADE</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;max-width:480px;margin:auto;padding:10px}
button{padding:8px;margin:3px}
.card{border:1px solid #ddd;padding:10px;margin-bottom:8px;border-radius:10px}
.chat{height:200px;overflow:auto;border:1px solid #ccc;padding:5px}
</style>
</head>
<body>

<h2>⚡ 번개 모임</h2>
<input id="title" placeholder="모임 제목">
<button onclick="addMeet()">등록</button>
<div id="meetList"></div>

<hr>
<h2>💬 채팅</h2>
<div id="chat" class="chat"></div>
<input id="msg"><button onclick="sendMsg()">전송</button>

<hr>
<h2>🛍️ 상품</h2>
<input id="pname" placeholder="상품명">
<input id="pprice" placeholder="가격">
<button onclick="addProduct()">등록</button>
<div id="products"></div>

<hr>
<h2>🎒 내 가방</h2>
<div id="bag"></div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentRoom = 'global';
let chatRef = db.ref('chat/global');
let nick = localStorage.getItem('nick') || prompt('닉네임 입력');
localStorage.setItem('nick', nick);

// 🔥 번개 모임
function addMeet(){
  const title = document.getElementById('title').value;
  const roomId = Date.now();

  db.ref('meets').push({title, roomId});
}

function loadMeets(){
  db.ref('meets').on('value', snap=>{
    const data = snap.val();
    const el = document.getElementById('meetList');
    el.innerHTML='';

    for(let k in data){
      const m = data[k];
      el.innerHTML += `
      <div class='card'>
        ${m.title}
        <button onclick="enterRoom('${m.roomId}')">참여</button>
      </div>`;
    }
  });
}

// 🔥 채팅방
function enterRoom(roomId){
  currentRoom = roomId;
  chatRef.off();

  chatRef = db.ref('chat/' + roomId);
  document.getElementById('chat').innerHTML='';

  chatRef.limitToLast(50).on('child_added', snap=>{
    const m = snap.val();
    document.getElementById('chat').innerHTML += `<div>${m.nick}: ${m.text}</div>`;
  });
}

function sendMsg(){
  const text = document.getElementById('msg').value;
  db.ref('chat/' + currentRoom).push({nick, text});
}

// 🔥 상품
function addProduct(){
  const name = document.getElementById('pname').value;
  const price = document.getElementById('pprice').value;

  db.ref('products').push({name, price});
}

function loadProducts(){
  db.ref('products').on('value', snap=>{
    const data = snap.val();
    const el = document.getElementById('products');
    el.innerHTML='';

    for(let k in data){
      const p = data[k];
      el.innerHTML += `
      <div class='card'>
        ${p.name} (${p.price}원)
        <button onclick="gift('${p.name}','${p.price}')">선물</button>
      </div>`;
    }
  });
}

// 🔥 선물하기
function gift(name, price){
  const to = prompt('받는 사람 닉네임');

  db.ref('bags/' + to).push({name, price});
  alert('선물 완료!');
}

// 🔥 내 가방
function loadBag(){
  db.ref('bags/' + nick).on('value', snap=>{
    const data = snap.val();
    const el = document.getElementById('bag');
    el.innerHTML='';

    for(let k in data){
      const i = data[k];
      el.innerHTML += `<div>${i.name} (${i.price})</div>`;
    }
  });
}

// 실행
loadMeets();
loadProducts();
loadBag();
</script>

</body>
</html>
