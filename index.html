<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIJI COURT — 테니스·배드민턴 커뮤니티</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
  /* 사장님 앱의 기본 색상과 디자인 설정입니다 */
  :root { --main-green: #3d8b3d; --point-orange: #ff6b2b; --bg-light: #f8fdf8; }
  body { font-family: 'Noto Sans KR', sans-serif; margin: 0; background: var(--bg-light); }
  .btn { cursor: pointer; border: none; border-radius: 8px; padding: 8px 12px; font-weight: bold; }
  .bg-green { background: var(--main-green); color: white; }
  .bg-orange { background: var(--point-orange); color: white; }
  
  /* 채팅방 디자인: 카톡처럼 내가 쓴 글은 오른쪽, 남이 쓴 글은 왼쪽 */
  .chat-item { margin: 10px; display: flex; flex-direction: column; }
  .chat-item.me { align-items: flex-end; }
  .chat-item.me .msg-box { background: #fee500; color: #000; }
  .msg-box { padding: 8px 12px; border-radius: 12px; max-width: 70%; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
  .msg-info { font-size: 10px; color: #888; margin-bottom: 4px; }
</style>
</head>

<body>
  <script>
    // 1. 파이어베이스 설정 (사장님의 파이어베이스 키를 여기에 넣으셔야 합니다)
    const firebaseConfig = { /* 사장님의 파이어베이스 설정값 */ };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentRoom = 'open_chat'; // 기본은 전체 채팅방
    let myNickname = localStorage.getItem('niji_nick') || '익명';

    // 2. 번개 모임 등록 함수 (채팅방 ID 생성 포함)
    function addMeet() {
      const title = document.getElementById('m-t').value;
      if(!title) { alert('제목을 입력해주세요!'); return; }

      // 모임마다 고유한 채팅방 번호(ID)를 자동으로 생성합니다.
      const chatRoomId = 'room_' + Date.now(); 

      const meetData = {
        title: title,
        sport: document.getElementById('m-sp').value,
        location: document.getElementById('m-pl').value,
        time: document.getElementById('m-ti').value,
        chatId: chatRoomId, // 이 모임 전용 채팅방 ID
        createdAt: Date.now()
      };

      db.ref('meets').push(meetData).then(() => {
        alert('✅ 번개 모임과 전용 채팅방이 만들어졌습니다!');
        // 입력창 닫기 로직
      });
    }

    // 3. 채팅방 입장 함수
    function joinChat(roomId, roomTitle) {
      currentRoom = roomId; // 지금부터는 이 방 번호로 대화 저장
      document.querySelector('.chat-title').innerText = roomTitle; // 상단 제목 변경
      
      // 채팅 탭으로 화면 이동
      showTab(2); 
      
      // 해당 방의 대화 내용만 불러오기
      loadMessages(roomId);
      alert(roomTitle + ' 방에 입장했습니다. 대화를 시작해보세요!');
    }

    // 4. 초대 링크 복사 함수
    function copyInvite(roomId) {
      const link = window.location.origin + window.location.pathname + '?room=' + roomId;
      navigator.clipboard.writeText(link).then(() => {
        alert('🔗 초대 링크가 복사되었습니다! 카톡에 붙여넣으세요.');
      });
    }

    // 5. 메시지 보내기 함수
    function sendMsg() {
      const text = document.getElementById('chat-input').value;
      if(!text) return;

      const msg = {
        sender: myNickname,
        text: text,
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
        timestamp: Date.now()
      };

      // 현재 접속 중인 방(currentRoom)에만 메시지를 저장합니다.
      db.ref('chats/' + currentRoom).push(msg);
      document.getElementById('chat-input').value = '';
    }

    // 6. 메시지 실시간 불러오기
    function loadMessages(roomId) {
      const chatList = document.getElementById('chat-list');
      db.ref('chats/' + roomId).on('value', (snapshot) => {
        chatList.innerHTML = ''; // 화면 청소
        snapshot.forEach((child) => {
          const d = child.val();
          const isMe = d.sender === myNickname;
          // 카톡 스타일로 화면에 그리기
          chatList.innerHTML += `
            <div class="chat-item ${isMe ? 'me' : ''}">
              <div class="msg-info">${d.sender} | ${d.time}</div>
              <div class="msg-box">${d.text}</div>
            </div>
          `;
        });
        chatList.scrollTop = chatList.scrollHeight; // 새 메시지 오면 맨 아래로
      });
    }
  </script>
</body>
</html>
